<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Style Preview 1 - Playful Colorful</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --paper: #fffaf0;
      --coral: #ff6b5f;
      --teal: #14b8a6;
      --lemon: #ffd166;
      --blue: #5b7cfa;
      --line: #172033;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(255, 209, 102, 0.45), transparent 34%),
        linear-gradient(315deg, rgba(20, 184, 166, 0.24), transparent 36%),
        var(--paper);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 18px;
    }

    .shell {
      width: min(900px, 100%);
      display: grid;
      gap: 18px;
    }

    .masthead {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
    }

    .label {
      width: fit-content;
      padding: 8px 12px;
      border: 2px solid var(--line);
      border-radius: 999px;
      background: var(--lemon);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 0;
      font-size: clamp(34px, 8vw, 72px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .meter {
      width: 160px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 10px;
      box-shadow: 6px 6px 0 var(--line);
      font-weight: 800;
    }

    .bar {
      height: 10px;
      margin-top: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--coral) 0 35%, var(--teal) 35% 65%, var(--blue) 65%);
    }

    .card {
      border: 3px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 10px 10px 0 var(--line);
      padding: clamp(18px, 4vw, 36px);
    }

    .question-row {
      display: grid;
      grid-template-columns: 108px 1fr;
      gap: 22px;
      align-items: center;
    }

    .coffee-mark {
      aspect-ratio: 1;
      border: 3px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(90deg, transparent 50%, rgba(255, 255, 255, 0.35) 50%),
        var(--coral);
      display: grid;
      place-items: center;
      font-size: 46px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 2px 2px 0 var(--line);
    }

    h2 {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.04;
      letter-spacing: 0;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 28px;
    }

    button {
      min-height: 62px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      text-align: left;
      padding: 14px 16px;
      box-shadow: 4px 4px 0 var(--line);
    }

    button:nth-child(1) {
      background: #ffddd8;
    }

    button:nth-child(2) {
      background: #d9fbf5;
    }

    button:nth-child(3) {
      background: #fff0b8;
    }

    button:nth-child(4) {
      background: #e2e7ff;
    }

    @media (max-width: 680px) {
      .masthead,
      .question-row {
        display: grid;
      }

      .meter {
        width: 100%;
      }

      .question-row,
      .answers {
        grid-template-columns: 1fr;
      }

      .coffee-mark {
        width: 96px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell" aria-label="Playful colorful quiz preview">
      <div class="masthead">
        <div>
          <div class="label">Style 1: Playful Colorful</div>
          <h1>Coffee Personality Quiz</h1>
        </div>
        <div class="meter">
          Question 3 of 7
          <div class="bar" aria-hidden="true"></div>
        </div>
      </div>

      <article class="card">
        <div class="question-row">
          <div class="coffee-mark" aria-hidden="true">Q3</div>
          <h2>A tiny door appears in your kitchen wall. What is definitely behind it?</h2>
        </div>
        <div class="answers">
          <button>A roaring city made of neon shortcuts</button>
          <button>A quiet glass room with one perfect chair</button>
          <button>A bakery where everything has extra frosting</button>
          <button>A long table full of your favorite people</button>
        </div>
      </article>
    </section>
  </main>
</body>
</html>

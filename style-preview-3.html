<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Style Preview 3 - Bold Dramatic</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f8fafc;
      --muted: #a6b0c3;
      --panel: #111827;
      --line: #2f3a4e;
      --red: #ff3d4d;
      --cyan: #22d3ee;
      --gold: #fbbf24;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(120deg, rgba(255, 61, 77, 0.22), transparent 32%),
        linear-gradient(300deg, rgba(34, 211, 238, 0.2), transparent 35%),
        #070a12;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px 18px;
    }

    .shell {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: 0.8fr 1.2fr;
      gap: 18px;
      align-items: stretch;
    }

    .poster,
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(17, 24, 39, 0.92);
    }

    .poster {
      min-height: 460px;
      padding: 22px;
      display: grid;
      align-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .poster::before {
      content: "";
      position: absolute;
      inset: 58px 0 auto;
      height: 12px;
      background: repeating-linear-gradient(90deg, var(--red) 0 26px, transparent 26px 42px, var(--cyan) 42px 68px);
      transform: skewY(-11deg);
      opacity: 0.9;
    }

    .label {
      color: var(--cyan);
      font-family: ui-sans-serif, system-ui, sans-serif;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(52px, 9vw, 96px);
      line-height: 0.86;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .stat {
      display: grid;
      gap: 7px;
      font-family: ui-sans-serif, system-ui, sans-serif;
      color: var(--muted);
      font-weight: 700;
    }

    .stat strong {
      color: var(--gold);
      font-size: 24px;
    }

    .card {
      padding: clamp(18px, 4vw, 36px);
      display: grid;
      align-content: center;
      min-height: 460px;
    }

    h2 {
      margin: 0;
      font-size: clamp(34px, 6vw, 64px);
      line-height: 0.92;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .answers {
      display: grid;
      gap: 12px;
      margin-top: 30px;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    button {
      min-height: 58px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0b1020;
      color: var(--ink);
      font: inherit;
      font-weight: 850;
      text-align: left;
      padding: 14px 16px;
      border-left: 6px solid var(--red);
    }

    button:nth-child(2) {
      border-left-color: var(--cyan);
    }

    button:nth-child(3) {
      border-left-color: var(--gold);
    }

    button:nth-child(4) {
      border-left-color: #a78bfa;
    }

    @media (max-width: 760px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .poster {
        min-height: 280px;
      }

      .card {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell" aria-label="Bold dramatic quiz preview">
      <aside class="poster">
        <div class="label">Style 3: Bold Dramatic</div>
        <h1>Coffee<br>Quiz</h1>
        <div class="stat">
          Progress
          <strong>03 / 07</strong>
        </div>
      </aside>

      <article class="card">
        <h2>A tiny door appears in your kitchen wall. What is definitely behind it?</h2>
        <div class="answers">
          <button>A roaring city made of neon shortcuts</button>
          <button>A quiet glass room with one perfect chair</button>
          <button>A bakery where everything has extra frosting</button>
          <button>A long table full of your favorite people</button>
        </div>
      </article>
    </section>
  </main>
</body>
</html>

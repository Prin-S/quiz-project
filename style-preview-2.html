<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Style Preview 2 - Minimal Clean</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111827;
      --muted: #6b7280;
      --line: #d8dee8;
      --paper: #ffffff;
      --wash: #f6f8fb;
      --sage: #6ea58d;
      --plum: #8b5e83;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--wash);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 40px 18px;
    }

    .shell {
      width: min(760px, 100%);
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(22px, 5vw, 56px);
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: start;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--sage);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 620px;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .progress {
      min-width: 108px;
      color: var(--muted);
      font-size: 14px;
      text-align: right;
    }

    .progress span {
      display: block;
      margin-top: 8px;
      color: var(--ink);
      font-size: 28px;
      font-weight: 700;
    }

    .question {
      padding-top: 34px;
    }

    h2 {
      margin: 0;
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 650;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .answers {
      display: grid;
      gap: 10px;
      margin-top: 26px;
    }

    button {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 14px;
      align-items: center;
      min-height: 58px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      text-align: left;
      padding: 12px 14px;
    }

    .token {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #edf7f3;
      color: var(--sage);
      font-weight: 800;
    }

    button:nth-child(2) .token {
      background: #f4edf3;
      color: var(--plum);
    }

    button:nth-child(3) .token {
      background: #f8f1df;
      color: #9a6d1f;
    }

    button:nth-child(4) .token {
      background: #eef2ff;
      color: #5663b7;
    }

    footer {
      margin-top: 30px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      header {
        grid-template-columns: 1fr;
      }

      .progress {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell" aria-label="Minimal clean quiz preview">
      <header>
        <div>
          <p class="eyebrow">Style 2: Minimal Clean</p>
          <h1>Coffee Personality Quiz</h1>
        </div>
        <div class="progress">
          Question
          <span>3 / 7</span>
        </div>
      </header>

      <section class="question">
        <h2>A tiny door appears in your kitchen wall. What is definitely behind it?</h2>
        <div class="answers">
          <button><span class="token">A</span><span>A roaring city made of neon shortcuts</span></button>
          <button><span class="token">B</span><span>A quiet glass room with one perfect chair</span></button>
          <button><span class="token">C</span><span>A bakery where everything has extra frosting</span></button>
          <button><span class="token">D</span><span>A long table full of your favorite people</span></button>
        </div>
      </section>

      <footer>Quiet layout, high readability, low decoration.</footer>
    </section>
  </main>
</body>
</html>

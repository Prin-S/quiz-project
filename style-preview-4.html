<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Style Preview 4 - Warm Cozy</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #23211d;
      --cream: #fff8ea;
      --moss: #4f6f52;
      --clay: #c95f45;
      --rose: #b24b70;
      --gold: #d9a441;
      --line: #e5d9c7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, #fffdf7 0%, var(--cream) 48%, #f3ead9 100%);
    }

    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 34px 18px;
    }

    .shell {
      width: min(880px, 100%);
      display: grid;
      gap: 18px;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      align-items: center;
      font-family: ui-sans-serif, system-ui, sans-serif;
      color: var(--moss);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .progress {
      color: var(--rose);
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 20px;
      align-items: stretch;
    }

    .intro,
    .steam-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.75);
    }

    .intro {
      padding: clamp(22px, 5vw, 46px);
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 68px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .steam-panel {
      min-height: 220px;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
    }

    .cup {
      width: 112px;
      height: 82px;
      border: 4px solid var(--moss);
      border-top: 0;
      border-radius: 0 0 28px 28px;
      background: #ffffff;
      position: relative;
    }

    .cup::after {
      content: "";
      position: absolute;
      width: 36px;
      height: 42px;
      right: -38px;
      top: 12px;
      border: 4px solid var(--moss);
      border-left: 0;
      border-radius: 0 24px 24px 0;
    }

    .steam {
      position: absolute;
      top: 38px;
      width: 86px;
      height: 46px;
      border-top: 4px solid var(--clay);
      border-radius: 50%;
    }

    .steam.two {
      top: 58px;
      width: 52px;
      border-color: var(--gold);
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: clamp(18px, 4vw, 34px);
    }

    h2 {
      margin: 0;
      font-size: clamp(25px, 4vw, 38px);
      line-height: 1.14;
      letter-spacing: 0;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 26px;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    button {
      min-height: 66px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffaf2;
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      text-align: left;
      padding: 14px 16px;
    }

    button:nth-child(1) {
      border-top: 5px solid var(--clay);
    }

    button:nth-child(2) {
      border-top: 5px solid var(--moss);
    }

    button:nth-child(3) {
      border-top: 5px solid var(--rose);
    }

    button:nth-child(4) {
      border-top: 5px solid var(--gold);
    }

    @media (max-width: 720px) {
      .hero,
      .answers {
        grid-template-columns: 1fr;
      }

      .steam-panel {
        min-height: 180px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="shell" aria-label="Warm cozy quiz preview">
      <div class="topline">
        <span>Style 4: Warm Cozy</span>
        <span class="progress">Question 3 of 7</span>
      </div>

      <section class="hero">
        <div class="intro">
          <h1>Coffee Personality Quiz</h1>
        </div>
        <div class="steam-panel" aria-hidden="true">
          <div class="steam"></div>
          <div class="steam two"></div>
          <div class="cup"></div>
        </div>
      </section>

      <article class="card">
        <h2>A tiny door appears in your kitchen wall. What is definitely behind it?</h2>
        <div class="answers">
          <button>A roaring city made of neon shortcuts</button>
          <button>A quiet glass room with one perfect chair</button>
          <button>A bakery where everything has extra frosting</button>
          <button>A long table full of your favorite people</button>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
